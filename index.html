function getTileSize() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const byW = Math.floor((vw - 24 - 7 * 4) / 8);
  const byH = Math.floor((vh - 270 - 7 * 4 - 12) / 8);
  return Math.min(byW, byH, 58);
}

/* ═══════════════════════════════════════════════ */

const PIECES = [
  { bg:"#FFD0CC", label:"Choc",   cb:"CH", emoji:"🍫" },
  { bg:"#FFCCE0", label:"Bunny",  cb:"BN", emoji:"🐰" },
  { bg:"#F8D0E8", label:"Egg",    cb:"EG", emoji:"🥚" },
  { bg:"#FFE0C0", label:"Carrot", cb:"CR", emoji:"🥕" },

const SP = { NONE:0, STRH:1, STRV:2, WRAP:3, BOMB:4 };
const rnd = n => Math.floor(Math.random()*n);
const key = (r,c) => `${r}-${c}`;
const wait = ms => new Promise(r=>setTimeout(r,ms));
const mkCandy = (t=null) => ({ type:t??rnd(CFG.TYPES), sp:SP.NONE, id:Math.random() });
const cloneB = b => b.map(row=>row.map(c=>c?{...c}:null));

function initBoard() {
  const b = Array.from({length:CFG.ROWS},()=>Array.from({length:CFG.COLS},()=>mkCandy()));
  for(let r=0;r<CFG.ROWS;r++) for(let c=0;c<CFG.COLS;c++){
    const used=new Set();
    if(r>=2&&b[r-1][c]?.type===b[r-2][c]?.type) used.add(b[r-1][c].type);
    if(c>=2&&b[r][c-1]?.type===b[r][c-2]?.type) used.add(b[r][c-1].type);
    let t=rnd(CFG.TYPES),tries=0;
    while(used.has(t)&&tries<20){t=rnd(CFG.TYPES);tries++;}
    b[r][c].type=t;
  }
  return b;
}

function getMatches(b) {
  const m=new Set();
  for(let r=0;r<CFG.ROWS;r++){let run=1;for(let c=1;c<=CFG.COLS;c++){const same=c<CFG.COLS&&b[r][c]?.type===b[r][c-1]?.type&&b[r][c]?.type!==undefined;if(same)run++;else{if(run>=3)for(let k=c-run;k<c;k++)m.add(key(r,k));run=1;}}}
  for(let c=0;c<CFG.COLS;c++){let run=1;for(let r=1;r<=CFG.ROWS;r++){const same=r<CFG.ROWS&&b[r][c]?.type===b[r-1][c]?.type&&b[r][c]?.type!==undefined;if(same)run++;else{if(run>=3)for(let k=r-run;k<r;k++)m.add(key(k,c));run=1;}}}
  return m;
}

function gravity(b) {
  const nb=cloneB(b);
  for(let c=0;c<CFG.COLS;c++){let wr=CFG.ROWS-1;for(let r=CFG.ROWS-1;r>=0;r--){if(nb[r][c]!==null){nb[wr][c]=nb[r][c];if(wr!==r)nb[r][c]=null;wr--;}}while(wr>=0){nb[wr][c]=mkCandy();wr--;}}
  return nb;
}

function hasMoves(b) {
  for(let r=0;r<CFG.ROWS;r++) for(let c=0;c<CFG.COLS;c++){
    const test=(r1,c1,r2,c2)=>{const t=cloneB(b);[t[r1][c1],t[r2][c2]]=[t[r2][c2],t[r1][c1]];return getMatches(t).size>0;};
    if(c+1<CFG.COLS&&test(r,c,r,c+1))return true;
    if(r+1<CFG.ROWS&&test(r,c,r+1,c))return true;
  }
  return false;
}

function explode(b,r,c,rem){
  const candy=b[r][c];if(!candy)return;
  if(candy.sp===SP.STRH)for(let cc=0;cc<CFG.COLS;cc++)rem.add(key(r,cc));
  else if(candy.sp===SP.STRV)for(let rr=0;rr<CFG.ROWS;rr++)rem.add(key(rr,c));
  else if(candy.sp===SP.WRAP)for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){const nr=r+dr,nc=c+dc;if(nr>=0&&nr<CFG.ROWS&&nc>=0&&nc<CFG.COLS)rem.add(key(nr,nc));}
}

function SBox({label,val,color}){
  return <div style={{flex:1,background:"rgba(255,255,255,0.6)",borderRadius:10,padding:"5px 3px",textAlign:"center"}}>
    <div style={{color:"rgba(120,50,140,0.55)",fontSize:9,letterSpacing:1,marginBottom:1,fontWeight:800,textTransform:"uppercase"}}>{label}</div>
    <div style={{color,fontSize:15,fontWeight:900}}>{val}</div>
  </div>;
}

function PieceIcon({p,size=36,isBomb=false,cbMode=false}){
  if(cbMode) return <span style={{fontSize:10,fontWeight:900,color:"rgba(80,30,100,0.8)"}}>{p.cb}</span>;
  if(isBomb) return <span style={{fontSize:size,lineHeight:1,display:"block"}}>🌈</span>;
  return <span style={{fontSize:size,lineHeight:1,display:"block"}}>{p.emoji}</span>;
}

function App() {
  const [board,setBoard]=useState(()=>initBoard());
  const [sel,setSel]=useState(null);
  const [score,setScore]=useState(0);
  const [moves,setMoves]=useState(CFG.MOVES);
  const [lives,setLives]=useState(CFG.MAX_LIVES);
  const [phase,setPhase]=useState("idle");
  const [lit,setLit]=useState(new Set());
  const [cbMode,setCbMode]=useState(false);
  const [toast,setToast]=useState(null);
  const [level,setLevel]=useState(1);
  const [levelUp,setLevelUp]=useState(false);
  const [tileSize,setTileSize]=useState(()=>getTileSize());
  const busy=useRef(false);
  const sc=useRef(0);
  const touchStart=useRef(null);

  useEffect(()=>{
    const handler=()=>setTileSize(getTileSize());
    window.addEventListener('resize',handler);
    window.addEventListener('orientationchange',()=>setTimeout(handler,100));
    return ()=>window.removeEventListener('resize',handler);
  },[]);

  const cascade=useCallback(async(b,chain=0)=>{
    const m=getMatches(b);
    if(m.size===0){
      if(!hasMoves(b)){setToast("Reshuffling 🌸");await wait(700);setBoard(initBoard());setToast(null);}
      busy.current=false;setPhase("idle");return;
    }
    setLit(m);await wait(360);
    const mult=Math.pow(CFG.MULT,chain);
    const pts=Math.round(m.size*CFG.PTS*mult);
    sc.current+=pts;setScore(sc.current);
    if(chain>0){setToast(`${chain+1}x Combo! +${pts} 🐣`);setTimeout(()=>setToast(null),900);}
    const nb=cloneB(b);const rem=new Set(m);
    m.forEach(k=>{const[r,c]=k.split("-").map(Number);const cell=nb[r][c];if(cell?.sp&&cell.sp!==SP.NONE)explode(nb,r,c,rem);});
    const place=[];
    for(let r=0;r<CFG.ROWS;r++){let run=[],pt=null;for(let c=0;c<=CFG.COLS;c++){const k=key(r,c);if(c<CFG.COLS&&m.has(k)&&(pt===null||b[r][c]?.type===pt)){run.push([r,c]);pt=b[r][c]?.type;}else{if(run.length>=4){const[pr,pc]=run[Math.floor(run.length/2)];place.push({r:pr,c:pc,sp:run.length>=5?SP.BOMB:SP.STRH,type:b[pr][pc]?.type});}run=c<CFG.COLS&&m.has(k)?[[r,c]]:[];pt=c<CFG.COLS&&m.has(k)?b[r][c]?.type:null;}}}
    rem.forEach(k=>{const[r,c]=k.split("-").map(Number);if(nb[r]?.[c])nb[r][c]=null;});
    place.forEach(({r,c,sp,type})=>{if(type!=null)nb[r][c]={type,sp,id:Math.random()};});
    setLit(new Set());const g=gravity(nb);setBoard(g);await wait(280);await cascade(g,chain+1);
  },[]);

  const swap=useCallback(async(r1,c1,r2,c2)=>{
    if(busy.current)return;
    const b=cloneB(board);const a=b[r1][c1],bv=b[r2][c2];
    if(a?.sp===SP.BOMB&&bv?.sp===SP.BOMB){
      busy.current=true;setPhase("animating");setToast("🌈 BOARD CLEAR!");
      const cl=cloneB(b);for(let r=0;r<CFG.ROWS;r++)for(let c=0;c<CFG.COLS;c++)cl[r][c]=null;
      sc.current+=CFG.ROWS*CFG.COLS*CFG.PTS;setScore(sc.current);
      await wait(600);setToast(null);const f=gravity(cl);setBoard(f);setMoves(m=>m-1);await wait(280);await cascade(f);return;
    }
    if(a?.sp===SP.BOMB||bv?.sp===SP.BOMB){
      const tt=a?.sp===SP.BOMB?bv?.type:a?.type;
      if(tt!=null){busy.current=true;setPhase("animating");[b[r1][c1],b[r2][c2]]=[b[r2][c2],b[r1][c1]];setBoard(cloneB(b));await wait(180);
        for(let r=0;r<CFG.ROWS;r++)for(let c=0;c<CFG.COLS;c++)if(b[r][c]?.type===tt)b[r][c]=null;
        sc.current+=Math.round(CFG.ROWS*CFG.COLS*CFG.PTS*0.6);setScore(sc.current);
        const f=gravity(b);setBoard(f);setMoves(m=>m-1);await wait(280);await cascade(f);return;}
    }
    [b[r1][c1],b[r2][c2]]=[b[r2][c2],b[r1][c1]];
    if(getMatches(b).size===0){setLit(new Set([key(r1,c1),key(r2,c2)]));setTimeout(()=>setLit(new Set()),400);return;}
    busy.current=true;setPhase("animating");setBoard(cloneB(b));setMoves(m=>m-1);await wait(180);await cascade(b);
  },[board,cascade]);

  const handleTap=useCallback((r,c)=>{
    if(phase!=="idle"||moves<=0)return;
    if(!sel){setSel([r,c]);return;}
    const[sr,sc2]=sel;
    if(sr===r&&sc2===c){setSel(null);return;}
    const adj=(Math.abs(sr-r)===1&&sc2===c)||(Math.abs(sc2-c)===1&&sr===r);
    if(!adj){setSel([r,c]);return;}
    setSel(null);swap(sr,sc2,r,c);
  },[phase,sel,moves,swap]);

  const handleTouchStart=useCallback((e,r,c)=>{
    const t=e.touches[0];
    touchStart.current={r,c,x:t.clientX,y:t.clientY};
  },[]);

  const handleTouchEnd=useCallback((e,r,c)=>{
    if(!touchStart.current)return;
    const{r:sr,c:sc2,x:sx,y:sy}=touchStart.current;
    touchStart.current=null;
    if(sr!==r||sc2!==c)return;
    const t=e.changedTouches[0];
    const dx=t.clientX-sx,dy=t.clientY-sy;
    const absDx=Math.abs(dx),absDy=Math.abs(dy);
    const threshold=tileSize*0.35;
    if(absDx<threshold&&absDy<threshold){handleTap(r,c);return;}
    if(phase!=="idle"||moves<=0)return;
    setSel(null);
    if(absDx>absDy){const tc=dx>0?c+1:c-1;if(tc>=0&&tc<CFG.COLS)swap(r,c,r,tc);}
    else{const tr=dy>0?r+1:r-1;if(tr>=0&&tr<CFG.ROWS)swap(r,c,tr,c);}
  },[handleTap,phase,moves,swap,tileSize]);

  useEffect(()=>{
    if(phase!=="idle")return;
    if(score>=CFG.TARGET*level){
      setLevelUp(true);
      setTimeout(()=>{setLevelUp(false);setLevel(l=>l+1);setMoves(CFG.MOVES);setBoard(initBoard());sc.current=0;setScore(0);},2200);
    } else if(moves<=0){setPhase("gameover");setLives(l=>Math.max(0,l-1));}
  },[score,moves,phase,level]);

  const restart=()=>{sc.current=0;setBoard(initBoard());setScore(0);setMoves(CFG.MOVES);setPhase("idle");setSel(null);setLit(new Set());busy.current=false;};

  const target=CFG.TARGET*level;
  const prog=Math.min(1,score/target);
  const gap=4;
  const iconSize=Math.max(tileSize*0.52,14);

  return (
    <div style={{minHeight:"100dvh",background:"linear-gradient(160deg,#fce4ec 0%,#f8bbd0 20%,#e1bee7 50%,#b3e5fc 80%,#dcedc8 100%)",display:"flex",flexDirection:"column",alignItems:"center",padding:"8px 6px 12px",fontFamily:"'Trebuchet MS',Georgia,sans-serif",userSelect:"none",overscrollBehavior:"none"}}>

      <div style={{position:"fixed",top:-60,left:-60,width:240,height:240,borderRadius:"50%",background:"rgba(255,182,193,0.4)",filter:"blur(50px)",pointerEvents:"none"}}/>
      <div style={{position:"fixed",bottom:-80,right:-60,width:280,height:280,borderRadius:"50%",background:"rgba(179,229,252,0.4)",filter:"blur(60px)",pointerEvents:"none"}}/>
      <div style={{position:"fixed",top:"40%",right:-50,width:180,height:180,borderRadius:"50%",background:"rgba(220,196,240,0.35)",filter:"blur(45px)",pointerEvents:"none"}}/>

      <div style={{fontSize:18,letterSpacing:5,marginBottom:3,opacity:0.65}}>🌷🌼🌸🌼🌷</div>
      <div style={{fontSize:20,fontWeight:900,letterSpacing:2,marginBottom:8,background:"linear-gradient(90deg,#e91e8c,#9c27b0,#3f51b5)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>
        🐣 EASTER MATCH 🐰
      </div>

      <div style={{width:"100%",maxWidth:CFG.COLS*tileSize+(CFG.COLS-1)*gap+12,marginBottom:8}}>
        <div style={{display:"flex",gap:4,marginBottom:6}}>
          <SBox label="Level" val={level} color="#9c27b0"/>
          <SBox label="Score" val={score.toLocaleString()} color="#e91e8c"/>
          <SBox label="Moves" val={moves} color={moves<=5?"#e53935":"#2e7d32"}/>
          <SBox label="Lives" val={"❤️".repeat(Math.max(0,lives))||"💀"} color="#e91e8c"/>
        </div>
        <div style={{background:"rgba(255,255,255,0.5)",borderRadius:10,height:12,overflow:"hidden"}}>
          <div style={{width:`${prog*100}%`,height:"100%",background:"linear-gradient(90deg,#f06292,#ba68c8,#7986cb)",borderRadius:10,transition:"width 0.4s ease"}}/>
        </div>
        <div style={{color:"rgba(100,40,120,0.5)",fontSize:10,textAlign:"right",marginTop:2}}>{score.toLocaleString()} / {target.toLocaleString()}</div>
        <div style={{display:"flex",justifyContent:"center",marginTop:8}}>
          <button onClick={restart} style={{background:"linear-gradient(135deg,#f06292,#ba68c8)",color:"#fff",border:"none",borderRadius:14,padding:"11px 22px",fontSize:15,fontWeight:900,cursor:"pointer",boxShadow:"0 3px 12px rgba(186,104,200,0.35)",touchAction:"manipulation",WebkitTapHighlightColor:"transparent"}}>🐣 New Game</button>
        </div>
      </div>

      {toast&&<div style={{position:"fixed",top:"12%",left:"50%",transform:"translateX(-50%)",background:"linear-gradient(135deg,#f48fb1,#ce93d8)",color:"#fff",fontWeight:900,fontSize:16,padding:"10px 24px",borderRadius:28,zIndex:100,boxShadow:"0 6px 20px rgba(200,100,200,0.4)",whiteSpace:"nowrap",pointerEvents:"none"}}>{toast}</div>}

      {levelUp&&<div style={{position:"fixed",inset:0,background:"rgba(240,210,255,0.9)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}}>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:72}}>🐣</div>
          <div style={{fontSize:38,fontWeight:900,background:"linear-gradient(90deg,#e91e8c,#9c27b0)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>LEVEL UP!</div>
          <div style={{fontSize:24,color:"#7b1fa2",marginTop:6}}>🌷 Level {level+1} 🌷</div>
        </div>
      </div>}

      <div style={{background:"rgba(255,255,255,0.3)",borderRadius:18,padding:6,boxShadow:"0 4px 20px rgba(160,80,200,0.1)",touchAction:"none"}}>
        {board.map((row,r)=>(
          <div key={r} style={{display:"flex",gap:gap,marginBottom:r<CFG.ROWS-1?gap:0}}>
            {row.map((candy,c)=>{
              const k=key(r,c);
              const isSel=sel&&sel[0]===r&&sel[1]===c;
              const isLit=lit.has(k);
              const p=candy?PIECES[candy.type]:null;
              const isBomb=candy?.sp===SP.BOMB;
              let badge=null;
              if(candy?.sp===SP.STRH)badge="✨";
              else if(candy?.sp===SP.STRV)badge="💫";
              else if(candy?.sp===SP.WRAP)badge="⭐";
              const tileBg=p?(isBomb?"conic-gradient(#FFCCE0,#FFF4B0,#F8D0E8,#E8C8A0,#FFE0C0,#FFF0C0,#FFD0CC)":p.bg):"rgba(255,255,255,0.4)";
              return (
                <div key={candy?.id??k} className="tile"
                  onTouchStart={e=>handleTouchStart(e,r,c)}
                  onTouchEnd={e=>handleTouchEnd(e,r,c)}
                  onClick={()=>handleTap(r,c)}
                  style={{width:tileSize,height:tileSize,borderRadius:Math.round(tileSize*0.2),background:tileBg,border:"none",outline:isSel?"3px solid #9c27b0":isLit?"3px solid #f9a825":"none",outlineOffset:"-2px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transform:isSel?"scale(1.12) translateY(-2px)":isLit?"scale(0.88)":"scale(1)",transition:"transform 0.13s cubic-bezier(.34,1.56,.64,1),opacity 0.13s",opacity:isLit?0.72:1,position:"relative",overflow:"hidden",WebkitTapHighlightColor:"transparent",touchAction:"none"}}
                >
                  {candy&&<>
                    <PieceIcon p={p} size={iconSize} isBomb={isBomb} cbMode={cbMode}/>
                    {badge&&<div style={{position:"absolute",bottom:2,right:2,fontSize:Math.max(8,tileSize*0.16),lineHeight:1,zIndex:3,opacity:0.85}}>{badge}</div>}
                  </>}
                </div>
              );
            })}
          </div>
        ))}
      </div>

      <div style={{marginTop:8,display:"flex",gap:10,flexWrap:"wrap",justifyContent:"center"}}>
        {[["✨","Row"],["💫","Col"],["⭐","Wrap"],["🌈","Bomb"]].map(([s,l])=>(
          <span key={l} style={{color:"rgba(100,40,120,0.55)",fontSize:11}}>{s} {l}</span>
        ))}
      </div>

      <div style={{marginTop:6,display:"flex",gap:5,flexWrap:"wrap",justifyContent:"center",maxWidth:480}}>
        {PIECES.map(p=>(
          <div key={p.label} style={{background:"rgba(255,255,255,0.6)",borderRadius:10,padding:"3px 8px",fontSize:11,color:"rgba(80,30,100,0.75)",display:"flex",alignItems:"center",gap:4}}>
            <span style={{fontSize:17}}>{p.emoji}</span>{p.label}
          </div>
        ))}
      </div>

      <div style={{display:"flex",gap:8,marginTop:10}}>
        <button onClick={()=>setCbMode(v=>!v)} style={{background:"rgba(255,255,255,0.6)",border:"none",borderRadius:14,padding:"11px 14px",fontSize:13,color:"rgba(100,40,120,0.8)",cursor:"pointer",touchAction:"manipulation",WebkitTapHighlightColor:"transparent"}}>👁 {cbMode?"CB ON":"OFF"}</button>
      </div>

      <div style={{fontSize:16,letterSpacing:5,marginTop:8,opacity:0.5}}>🌼🐰🌷🧺🌼</div>

      {phase==="gameover"&&(
        <div style={{position:"fixed",inset:0,background:"rgba(240,210,255,0.9)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300}}>
          <div style={{background:"linear-gradient(135deg,#fce4ec,#f3e5f5)",borderRadius:24,padding:"36px 44px",textAlign:"center",boxShadow:"0 16px 48px rgba(160,80,200,0.2)",maxWidth:"90vw"}}>
            <div style={{fontSize:56,marginBottom:6}}>🐰</div>
            <div style={{fontSize:24,fontWeight:900,background:"linear-gradient(90deg,#e91e8c,#9c27b0)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:4}}>Out of Moves!</div>
            <div style={{color:"rgba(100,40,120,0.85)",marginBottom:3,fontSize:15}}>Score: {score.toLocaleString()}</div>
            <div style={{color:"rgba(120,60,140,0.6)",fontSize:13,marginBottom:20}}>{lives>0?`${lives} ❤️ remaining`:"No lives left!"}</div>
            {lives>0&&<button onClick={restart} style={{display:"block",width:"100%",background:"linear-gradient(135deg,#f06292,#ba68c8)",color:"#fff",border:"none",borderRadius:14,padding:"13px 0",fontSize:16,fontWeight:900,cursor:"pointer",marginBottom:9,boxShadow:"0 3px 14px rgba(186,104,200,0.4)",touchAction:"manipulation"}}>Try Again 🐣</button>}
            <button onClick={()=>{setLevel(1);setLives(CFG.MAX_LIVES);restart();}} style={{display:"block",width:"100%",background:"rgba(200,140,220,0.2)",color:"#7b1fa2",border:"none",borderRadius:14,padding:"11px 0",fontSize:14,fontWeight:700,cursor:"pointer",touchAction:"manipulation"}}>New Game 🌷</button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>🐣 Easter Match</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  min-height:100vh;
  background:linear-gradient(160deg,#fce4ec 0%,#f8bbd0 20%,#e1bee7 50%,#b3e5fc 80%,#dcedc8 100%);
  font-family:'Trebuchet MS',Georgia,sans-serif;
  display:flex;flex-direction:column;align-items:center;
  padding:12px 6px;user-select:none;overflow-x:hidden;
}
.blob{position:fixed;border-radius:50%;filter:blur(60px);pointer-events:none;z-index:0}
#app{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;width:100%}
.flowers{font-size:20px;letter-spacing:6px;margin-bottom:4px;opacity:.65}
.title{
  font-size:24px;font-weight:900;letter-spacing:2px;margin-bottom:10px;
  background:linear-gradient(90deg,#e91e8c,#9c27b0,#3f51b5);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.stats{width:100%;max-width:440px;margin-bottom:9px}
.stat-row{display:flex;gap:5px;margin-bottom:7px}
.stat-box{flex:1;background:rgba(255,255,255,.6);border-radius:12px;padding:6px 4px;text-align:center}
.stat-label{color:rgba(120,50,140,.55);font-size:8px;letter-spacing:1.5px;margin-bottom:2px;font-weight:800;text-transform:uppercase}
.stat-val{font-size:14px;font-weight:900}
.progress-wrap{background:rgba(255,255,255,.5);border-radius:12px;height:14px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,#f06292,#ba68c8,#7986cb);border-radius:12px;transition:width .4s ease}
.progress-text{color:rgba(100,40,120,.5);font-size:10px;text-align:right;margin-top:2px}
.board-wrap{background:rgba(255,255,255,.3);border-radius:20px;padding:6px;box-shadow:0 4px 24px rgba(160,80,200,.12)}
.board-row{display:flex;gap:4px;margin-bottom:4px}
.board-row:last-child{margin-bottom:0}
.tile{
  width:52px;height:52px;border-radius:12px;border:none;outline:none;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;position:relative;overflow:hidden;
  font-size:34px;line-height:1;
  transition:transform .14s cubic-bezier(.34,1.56,.64,1),opacity .15s;
}
.tile.selected{outline:3px solid #9c27b0;outline-offset:-2px;transform:scale(1.14) translateY(-2px)}
.tile.lit{outline:3px solid #f9a825;outline-offset:-2px;transform:scale(0.88);opacity:.7}
.tile svg{display:block}
.badge{position:absolute;bottom:2px;right:2px;font-size:10px;line-height:1;opacity:.85}
.legend{margin-top:10px;display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
.legend span{color:rgba(100,40,120,.55);font-size:11px}
.guide{margin-top:8px;display:flex;gap:5px;flex-wrap:wrap;justify-content:center;max-width:440px}
.guide-item{background:rgba(255,255,255,.6);border-radius:10px;padding:4px 9px;font-size:12px;color:rgba(80,30,100,.75);display:flex;align-items:center;gap:4px}
.guide-item span{font-size:18px}
.btn-row{display:flex;gap:8px;margin-top:12px}
.btn-primary{background:linear-gradient(135deg,#f06292,#ba68c8);color:#fff;border:none;border-radius:14px;padding:10px 24px;font-size:14px;font-weight:900;cursor:pointer;box-shadow:0 3px 12px rgba(186,104,200,.35);letter-spacing:1px}
.btn-sec{background:rgba(255,255,255,.6);border:none;border-radius:14px;padding:10px 16px;font-size:12px;color:rgba(100,40,120,.8);cursor:pointer}
.footer{font-size:18px;letter-spacing:6px;margin-top:10px;opacity:.55}
/* Toast */
#toast{
  display:none;position:fixed;top:14%;left:50%;transform:translateX(-50%);
  background:linear-gradient(135deg,#f48fb1,#ce93d8);color:#fff;
  font-weight:900;font-size:17px;padding:11px 28px;border-radius:32px;
  z-index:200;box-shadow:0 6px 24px rgba(200,100,200,.4);white-space:nowrap;pointer-events:none;
}
/* Overlays */
.overlay{display:none;position:fixed;inset:0;align-items:center;justify-content:center;z-index:300;backdrop-filter:blur(8px)}
.overlay.show{display:flex}
#levelup-overlay{background:rgba(240,210,255,.88)}
#gameover-overlay{background:rgba(240,210,255,.88)}
.overlay-box{background:linear-gradient(135deg,#fce4ec,#f3e5f5);border-radius:28px;padding:40px 50px;text-align:center;box-shadow:0 16px 48px rgba(160,80,200,.2)}
.levelup-emoji{font-size:80px}
.levelup-title{font-size:42px;font-weight:900;background:linear-gradient(90deg,#e91e8c,#9c27b0);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.levelup-sub{font-size:26px;color:#7b1fa2;margin-top:8px}
.go-emoji{font-size:64px;margin-bottom:8px}
.go-title{font-size:28px;font-weight:900;background:linear-gradient(90deg,#e91e8c,#9c27b0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.go-score{color:rgba(100,40,120,.85);margin-bottom:4px;font-size:16px}
.go-lives{color:rgba(120,60,140,.6);font-size:13px;margin-bottom:24px}
.btn-try{display:block;width:100%;background:linear-gradient(135deg,#f06292,#ba68c8);color:#fff;border:none;border-radius:14px;padding:14px 0;font-size:16px;font-weight:900;cursor:pointer;margin-bottom:10px;box-shadow:0 3px 14px rgba(186,104,200,.4)}
.btn-new{display:block;width:100%;background:rgba(200,140,220,.2);color:#7b1fa2;border:none;border-radius:14px;padding:12px 0;font-size:14px;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<div class="blob" style="top:-60px;left:-60px;width:280px;height:280px;background:rgba(255,182,193,.45)"></div>
<div class="blob" style="bottom:-80px;right:-60px;width:320px;height:320px;background:rgba(179,229,252,.45);filter:blur(70px)"></div>

<div id="app">
  <div class="flowers">🌷🌼🌸🌼🌷</div>
  <div class="title">🐣 EASTER MATCH 🐰</div>

  <div class="stats">
    <div class="stat-row">
      <div class="stat-box"><div class="stat-label">Level</div><div class="stat-val" id="s-level" style="color:#9c27b0">1</div></div>
      <div class="stat-box"><div class="stat-label">Score</div><div class="stat-val" id="s-score" style="color:#e91e8c">0</div></div>
      <div class="stat-box"><div class="stat-label">Moves</div><div class="stat-val" id="s-moves" style="color:#2e7d32">30</div></div>
      <div class="stat-box"><div class="stat-label">Lives</div><div class="stat-val" id="s-lives" style="color:#e91e8c">❤️❤️❤️❤️❤️</div></div>
    </div>
    <div class="progress-wrap"><div class="progress-bar" id="prog" style="width:0%"></div></div>
    <div class="progress-text" id="prog-text">0 / 4000</div>
  </div>

  <div class="board-wrap" id="board"></div>

  <div class="legend">
    <span>✨ Row</span><span>💫 Col</span><span>⭐ Wrap</span><span>🌈 Bomb</span>
  </div>
  <div class="guide" id="guide"></div>

  <div class="btn-row">
    <button class="btn-primary" onclick="restart()">🐣 New Game</button>
    <button class="btn-sec" id="cb-btn" onclick="toggleCB()">👁 CB OFF</button>
  </div>
  <div class="footer">🌼🐰🌷🧺🌼</div>
</div>

<div id="toast"></div>

<div class="overlay" id="levelup-overlay">
  <div class="overlay-box">
    <div class="levelup-emoji">🐣</div>
    <div class="levelup-title">LEVEL UP!</div>
    <div class="levelup-sub" id="lu-sub">🌷 Level 2 🌷</div>
  </div>
</div>

<div class="overlay" id="gameover-overlay">
  <div class="overlay-box">
    <div class="go-emoji">🐰</div>
    <div class="go-title">Out of Moves!</div>
    <div class="go-score" id="go-score">Score: 0</div>
    <div class="go-lives" id="go-lives">5 ❤️ remaining</div>
    <button class="btn-try" id="btn-try" onclick="restart()">Try Again 🐣</button>
    <button class="btn-new" onclick="fullRestart()">New Game 🌷</button>
  </div>
</div>

<script>
// ─── CONFIG ─────────────────────────────────────────────────────────
const CFG = { ROWS:8, COLS:8, TYPES:7, MOVES:30, TARGET:4000, PTS:60, MULT:1.5, MAX_LIVES:5 };

// ─── PIECES ─────────────────────────────────────────────────────────
const EGG_SVG = `<svg width="30" height="37" viewBox="0 0 60 75" fill="none">
  <defs><linearGradient id="eg1" x1="10" y1="8" x2="50" y2="68" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#F48FB1"/><stop offset="100%" stop-color="#C2185B"/>
  </linearGradient></defs>
  <path d="M30 4 C14 4 8 22 8 38 C8 56 18 70 30 70 C42 70 52 56 52 38 C52 22 46 4 30 4Z" fill="url(#eg1)"/>
  <path d="M9.5 34 Q30 27 50.5 34 Q30 41 9.5 34Z" fill="#FFD93D"/>
  <path d="M9 42 Q30 36 51 42 Q30 48 9 42Z" fill="#6BCB77"/>
  <circle cx="20" cy="22" r="4" fill="#A78BFA"/>
  <circle cx="40" cy="22" r="4" fill="#4DC9F6"/>
  <circle cx="30" cy="14" r="3.5" fill="#FFD93D"/>
  <circle cx="18" cy="54" r="3.5" fill="#4DC9F6"/>
  <circle cx="42" cy="54" r="3.5" fill="#A78BFA"/>
</svg>`;

const BASKET_SVG = `<svg width="34" height="34" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bBody" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#D4A04A"/><stop offset="100%" stop-color="#8B5E10"/></linearGradient>
    <linearGradient id="bRim" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#E8B86D"/><stop offset="100%" stop-color="#C17F24"/></linearGradient>
    <linearGradient id="bHandle" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#C17F24"/><stop offset="50%" stop-color="#E8B86D"/><stop offset="100%" stop-color="#C17F24"/></linearGradient>
  </defs>
  <path d="M20 30 Q20 8 32 8 Q44 8 44 30" stroke="url(#bHandle)" stroke-width="4.5" stroke-linecap="round" fill="none"/>
  <path d="M8 34 Q8 58 32 58 Q56 58 56 34 Z" fill="url(#bBody)"/>
  <path d="M10 38 Q32 35 54 38" stroke="#8B5E10" stroke-width="1" opacity="0.5"/>
  <path d="M10 43 Q32 40 54 43" stroke="#8B5E10" stroke-width="1" opacity="0.5"/>
  <path d="M10 48 Q32 45 54 48" stroke="#8B5E10" stroke-width="1" opacity="0.5"/>
  <line x1="20" y1="34" x2="20" y2="57" stroke="#8B5E10" stroke-width="1" opacity="0.4"/>
  <line x1="32" y1="34" x2="32" y2="57" stroke="#8B5E10" stroke-width="1" opacity="0.4"/>
  <line x1="44" y1="34" x2="44" y2="57" stroke="#8B5E10" stroke-width="1" opacity="0.4"/>
  <rect x="6" y="31" width="52" height="7" rx="3.5" fill="url(#bRim)"/>
  <path d="M14 33 Q16 24 18 28 Q19 22 21 27 Q22 20 24 26" stroke="#4CAF50" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M26 33 Q28 23 30 28 Q31 21 33 27 Q34 22 36 27" stroke="#66BB6A" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M38 33 Q40 24 42 28 Q43 22 45 27 Q46 20 48 26" stroke="#4CAF50" stroke-width="2" stroke-linecap="round" fill="none"/>
  <ellipse cx="23" cy="30" rx="5" ry="6.5" fill="#FF8BBD"/>
  <path d="M18.2 30 Q23 27 27.8 30" stroke="#FFD93D" stroke-width="1.2" fill="none"/>
  <ellipse cx="32" cy="28" rx="5" ry="6.5" fill="#4DC9F6"/>
  <path d="M27.2 28 Q32 25 36.8 28" stroke="#A78BFA" stroke-width="1.2" fill="none"/>
  <ellipse cx="41" cy="30" rx="5" ry="6.5" fill="#FFD93D"/>
  <path d="M36.2 30 Q41 27 45.8 30" stroke="#6BCB77" stroke-width="1.2" fill="none"/>
</svg>`;

const PIECES = [
  { bg:"#FFCCE0", label:"Bunny",   cb:"BN", icon:"🐰" },
  { bg:"#FFF4B0", label:"Chick",   cb:"CK", icon:"🐣" },
  { bg:"#E8D0F7", label:"Egg",     cb:"EG", icon:EGG_SVG },
  { bg:"#B8F0F4", label:"Flower",  cb:"FL", icon:"🌸" },
  { bg:"#FFE0C0", label:"Carrot",  cb:"CR", icon:"🥕" },
  { bg:"#FFF0C0", label:"Basket",  cb:"BK", icon:BASKET_SVG },
  { bg:"#FFD0CC", label:"Choc",    cb:"CH", icon:"🍫" },
];

const SP = { NONE:0, STRH:1, STRV:2, WRAP:3, BOMB:4 };
const BOMB_BG = "conic-gradient(#FFCCE0,#FFF4B0,#C0F0E0,#FFF0C0,#E8D0F7,#FFE0C0,#FFD0CC)";

// ─── STATE ──────────────────────────────────────────────────────────
let board=[], sel=null, score=0, moves=CFG.MOVES, lives=CFG.MAX_LIVES;
let phase="idle", level=1, cbMode=false, busy=false;

// ─── HELPERS ────────────────────────────────────────────────────────
const rnd = n => Math.floor(Math.random()*n);
const key = (r,c) => r*100+c;
const wait = ms => new Promise(res=>setTimeout(res,ms));
const mk = (t=null) => ({ type:t??rnd(CFG.TYPES), sp:SP.NONE, id:Math.random() });
const cloneB = b => b.map(row=>row.map(c=>c?{...c}:null));

function isSVG(icon){ return icon && icon.startsWith('<svg'); }

function tileInner(candy){
  if(!candy) return '';
  const p = PIECES[candy.type];
  let icon;
  if(candy.sp===SP.BOMB){ icon='🌈'; }
  else if(cbMode){ icon=`<span style="font-size:11px;font-weight:900;color:rgba(80,30,100,.8)">${p.cb}</span>`; }
  else { icon = isSVG(p.icon) ? p.icon : `<span style="font-size:34px;line-height:1">${p.icon}</span>`; }
  let badge='';
  if(candy.sp===SP.STRH) badge='✨';
  else if(candy.sp===SP.STRV) badge='💫';
  else if(candy.sp===SP.WRAP) badge='⭐';
  return icon + (badge?`<div class="badge">${badge}</div>`:'');
}

// ─── BOARD INIT ─────────────────────────────────────────────────────
function initBoard(){
  const b = Array.from({length:CFG.ROWS},()=>Array.from({length:CFG.COLS},()=>mk()));
  for(let r=0;r<CFG.ROWS;r++) for(let c=0;c<CFG.COLS;c++){
    const used=new Set();
    if(r>=2&&b[r-1][c]?.type===b[r-2][c]?.type) used.add(b[r-1][c].type);
    if(c>=2&&b[r][c-1]?.type===b[r][c-2]?.type) used.add(b[r][c-1].type);
    let t=rnd(CFG.TYPES),tries=0;
    while(used.has(t)&&tries<20){t=rnd(CFG.TYPES);tries++;}
    b[r][c].type=t;
  }
  return b;
}

// ─── MATCH FINDING ──────────────────────────────────────────────────
function getMatches(b){
  const m=new Set();
  for(let r=0;r<CFG.ROWS;r++){let run=1;for(let c=1;c<=CFG.COLS;c++){const same=c<CFG.COLS&&b[r][c]?.type===b[r][c-1]?.type&&b[r][c]?.type!==undefined;if(same)run++;else{if(run>=3)for(let k=c-run;k<c;k++)m.add(key(r,k));run=1;}}}
  for(let c=0;c<CFG.COLS;c++){let run=1;for(let r=1;r<=CFG.ROWS;r++){const same=r<CFG.ROWS&&b[r][c]?.type===b[r-1][c]?.type&&b[r][c]?.type!==undefined;if(same)run++;else{if(run>=3)for(let k=r-run;k<r;k++)m.add(key(k,c));run=1;}}}
  return m;
}

function gravity(b){
  const nb=cloneB(b);
  for(let c=0;c<CFG.COLS;c++){
    let wr=CFG.ROWS-1;
    for(let r=CFG.ROWS-1;r>=0;r--){if(nb[r][c]!==null){nb[wr][c]=nb[r][c];if(wr!==r)nb[r][c]=null;wr--;}}
    while(wr>=0){nb[wr][c]=mk();wr--;}
  }
  return nb;
}

function hasMoves(b){
  for(let r=0;r<CFG.ROWS;r++) for(let c=0;c<CFG.COLS;c++){
    const test=(r1,c1,r2,c2)=>{const t=cloneB(b);[t[r1][c1],t[r2][c2]]=[t[r2][c2],t[r1][c1]];return getMatches(t).size>0;};
    if(c+1<CFG.COLS&&test(r,c,r,c+1))return true;
    if(r+1<CFG.ROWS&&test(r,c,r+1,c))return true;
  }
  return false;
}

function explode(b,r,c,rem){
  const candy=b[r][c];if(!candy)return;
  if(candy.sp===SP.STRH)for(let cc=0;cc<CFG.COLS;cc++)rem.add(key(r,cc));
  else if(candy.sp===SP.STRV)for(let rr=0;rr<CFG.ROWS;rr++)rem.add(key(rr,c));
  else if(candy.sp===SP.WRAP)for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){const nr=r+dr,nc=c+dc;if(nr>=0&&nr<CFG.ROWS&&nc>=0&&nc<CFG.COLS)rem.add(key(nr,nc));}
}

// ─── RENDER ─────────────────────────────────────────────────────────
function render(lit=new Set()){
  const boardEl=document.getElementById('board');
  boardEl.innerHTML='';
  for(let r=0;r<CFG.ROWS;r++){
    const row=document.createElement('div');
    row.className='board-row';
    for(let c=0;c<CFG.COLS;c++){
      const candy=board[r][c];
      const tile=document.createElement('div');
      tile.className='tile'+(sel&&sel[0]===r&&sel[1]===c?' selected':'')+(lit.has(key(r,c))?' lit':'');
      const p=candy?PIECES[candy.type]:null;
      tile.style.background=candy?(candy.sp===SP.BOMB?BOMB_BG:p.bg):'rgba(255,255,255,.4)';
      tile.innerHTML=tileInner(candy);
      tile.onclick=()=>handleClick(r,c);
      row.appendChild(tile);
    }
    boardEl.appendChild(row);
  }
  updateStats();
}

function updateStats(){
  document.getElementById('s-level').textContent=level;
  document.getElementById('s-score').textContent=score.toLocaleString();
  const movEl=document.getElementById('s-moves');
  movEl.textContent=moves;
  movEl.style.color=moves<=5?'#e53935':'#2e7d32';
  document.getElementById('s-lives').textContent='❤️'.repeat(Math.max(0,lives))||'💀';
  const target=CFG.TARGET*level;
  document.getElementById('prog').style.width=Math.min(100,score/target*100)+'%';
  document.getElementById('prog-text').textContent=score.toLocaleString()+' / '+target.toLocaleString();
}

function showToast(msg,dur=900){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.display='block';
  setTimeout(()=>t.style.display='none',dur);
}

// ─── GAME LOGIC ─────────────────────────────────────────────────────
async function cascade(b,chain=0){
  const m=getMatches(b);
  if(m.size===0){
    if(!hasMoves(b)){
      showToast('Reshuffling 🌸',700);
      await wait(700);
      board=initBoard();render();
    }
    busy=false;phase='idle';render();checkWinLose();return;
  }
  render(m);await wait(360);
  const mult=Math.pow(CFG.MULT,chain);
  const pts=Math.round(m.size*CFG.PTS*mult);
  score+=pts;
  if(chain>0) showToast(`${chain+1}x Combo! +${pts} 🐣`);
  const nb=cloneB(b);const rem=new Set(m);
  m.forEach(k=>{const r=Math.floor(k/100),c=k%100;const cell=nb[r][c];if(cell?.sp&&cell.sp!==SP.NONE)explode(nb,r,c,rem);});
  // detect 4/5 specials
  for(let r=0;r<CFG.ROWS;r++){
    let run=[],pt=null;
    for(let c=0;c<=CFG.COLS;c++){
      const k=key(r,c);
      if(c<CFG.COLS&&m.has(k)&&(pt===null||b[r][c]?.type===pt)){run.push([r,c]);pt=b[r][c]?.type;}
      else{
        if(run.length>=4){const[pr,pc]=run[Math.floor(run.length/2)];if(b[pr][pc]){nb[pr][pc]={type:b[pr][pc].type,sp:run.length>=5?SP.BOMB:SP.STRH,id:Math.random()};rem.delete(key(pr,pc));}}
        run=c<CFG.COLS&&m.has(k)?[[r,c]]:[];pt=c<CFG.COLS&&m.has(k)?b[r][c]?.type:null;
      }
    }
  }
  rem.forEach(k=>{const r=Math.floor(k/100),c=k%100;if(nb[r]?.[c])nb[r][c]=null;});
  const g=gravity(nb);board=g;render();await wait(280);
  await cascade(g,chain+1);
}

async function trySwap(r1,c1,r2,c2){
  if(busy)return;
  const b=cloneB(board);
  const a=b[r1][c1],bv=b[r2][c2];
  // bomb combos
  if(a?.sp===SP.BOMB&&bv?.sp===SP.BOMB){
    busy=true;phase='animating';showToast('🌈 BOARD CLEAR!',600);
    const cl=cloneB(b);for(let r=0;r<CFG.ROWS;r++)for(let c=0;c<CFG.COLS;c++)cl[r][c]=null;
    score+=CFG.ROWS*CFG.COLS*CFG.PTS;moves--;board=gravity(cl);render();await wait(700);
    await cascade(board);return;
  }
  if(a?.sp===SP.BOMB||bv?.sp===SP.BOMB){
    const tt=a?.sp===SP.BOMB?bv?.type:a?.type;
    if(tt!=null){
      busy=true;phase='animating';[b[r1][c1],b[r2][c2]]=[b[r2][c2],b[r1][c1]];board=cloneB(b);render();await wait(180);
      for(let r=0;r<CFG.ROWS;r++)for(let c=0;c<CFG.COLS;c++)if(b[r][c]?.type===tt)b[r][c]=null;
      score+=Math.round(CFG.ROWS*CFG.COLS*CFG.PTS*.6);moves--;board=gravity(b);render();await wait(280);
      await cascade(board);return;
    }
  }
  [b[r1][c1],b[r2][c2]]=[b[r2][c2],b[r1][c1]];
  if(getMatches(b).size===0){
    // invalid — flash
    const s=new Set([key(r1,c1),key(r2,c2)]);render(s);
    await wait(400);render();return;
  }
  busy=true;phase='animating';board=cloneB(b);moves--;render();await wait(180);
  await cascade(board);
}

function handleClick(r,c){
  if(phase!=='idle'||moves<=0)return;
  if(!sel){sel=[r,c];render();return;}
  const[sr,sc]=sel;
  if(sr===r&&sc===c){sel=null;render();return;}
  const adj=(Math.abs(sr-r)===1&&sc===c)||(Math.abs(sc-c)===1&&sr===r);
  if(!adj){sel=[r,c];render();return;}
  sel=null;render();
  trySwap(sr,sc,r,c);
}

function checkWinLose(){
  const target=CFG.TARGET*level;
  if(score>=target){
    document.getElementById('levelup-overlay').classList.add('show');
    document.getElementById('lu-sub').textContent=`🌷 Level ${level+1} 🌷`;
    setTimeout(()=>{
      document.getElementById('levelup-overlay').classList.remove('show');
      level++;moves=CFG.MOVES;score=0;board=initBoard();render();
    },2200);
  } else if(moves<=0){
    lives=Math.max(0,lives-1);
    document.getElementById('go-score').textContent='Score: '+score.toLocaleString();
    document.getElementById('go-lives').textContent=lives>0?`${lives} ❤️ remaining`:'No lives left!';
    document.getElementById('btn-try').style.display=lives>0?'block':'none';
    document.getElementById('gameover-overlay').classList.add('show');
    phase='gameover';
  }
}

function restart(){
  document.getElementById('gameover-overlay').classList.remove('show');
  score=0;moves=CFG.MOVES;board=initBoard();sel=null;busy=false;phase='idle';
  render();
}

function fullRestart(){
  document.getElementById('gameover-overlay').classList.remove('show');
  level=1;lives=CFG.MAX_LIVES;score=0;moves=CFG.MOVES;
  board=initBoard();sel=null;busy=false;phase='idle';render();
}

function toggleCB(){
  cbMode=!cbMode;
  document.getElementById('cb-btn').textContent=`👁 ${cbMode?'CB ON':'CB OFF'}`;
  render();
}

// ─── GUIDE ──────────────────────────────────────────────────────────
function buildGuide(){
  const g=document.getElementById('guide');
  PIECES.forEach(p=>{
    const d=document.createElement('div');
    d.className='guide-item';
    d.innerHTML=(isSVG(p.icon)?`<span style="display:inline-flex;align-items:center">${p.icon.replace(/width="\d+"/,'width="20"').replace(/height="\d+"/,'height="20"')}</span>`:`<span>${p.icon}</span>`)+p.label;
    g.appendChild(d);
  });
}

// ─── START ──────────────────────────────────────────────────────────
board=initBoard();
buildGuide();
render();
</script>
